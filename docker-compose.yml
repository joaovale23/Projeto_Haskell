services:
  postgres:
    image: postgres:16
    container_name: calculo_devs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devs
      POSTGRES_PASSWORD: devs
      POSTGRES_DB: calculo_devs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devs -d calculo_devs"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: calculo_devs_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  sympy:
    build: ./sympy_service
    container_name: calculo_devs_sympy
    restart: unless-stopped
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
